    #content {

      overflow-y: auto;
      scrollbar-width: none;
      zoom: 1.5;
      white-space: pre-wrap;

    }
    
    

    .child-ul {
      padding-left: 10px;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease;
      list-style-type: none;
    }
    

    .node {
      
      padding: 7px;

      white-space: nowrap;
      overflow: hidden;

    }

    .icon{
      display: inline-block;
      vertical-align: top;
      width: 20px; 
      height: 20px;
    }
  </style>

</body>

">\'SWRunName\' snmp.out | foreground="#18b218">tail\n\n<img src=/img/2/image-0.png></img>\n\nRunning process names with PID\'s.\n\n\nAfter some recon finally found a valuable info\n\n<b style=\'color: #54ff54\'>➜ \xa0</b><b style=\'color: #54ffff\'>Monitored</b> foreground="#18b218">grep foreground="#b26818">\'SWRun\' snmp.out | foreground="#18b218">grep 1434\n<img src=/img/2/image-1.png></img>\n\nsvc:XjH7VCehowpR1xZB\n \nThis might be credantials to login.\n', '<img src=/img/3/image-0.png></img>\n\nThat is not what we see when we login with wrong credantials.\n\n<img src=/img/3/image-1.png></img>\n\nSo we know credantials are true but hope that there is a way around to login.\n\n<img src=/img/3/image-2.png></img>\n\nI see this exploit on <a href="https://www.exploit-db.com/exploits/51925">exploit-db</a> and code giving us info about getting token and login with the token.\n\nOn burpsuite i replicate the request.\n\n<img src=/img/3/image-3.png></img>\n\nresponse:\n\n<img src=/img/3/image-4.png></img>\n\nThen bypass login with token', '<img src=/img/2/image-0.png></img>\n\nsome running services nothing interesting.\n\n<img src=/img/2/image-1.png></img>\n\nThe version of nagios leaked on dashboard.\n\nSo we can use <node data-id=7>sql injection</node>', "<img src=/img/3/image-0.png></img>\n\nThe id parameter seems like vulnarable.\n\n\n<img src=/img/3/image-1.png></img>\n\nTry simple sql injection test. Don't forget the cookie :).\n\n<img src=/img/3/image-2.png></img> \n\nLet's go to sqlmap because it is error based sql and it is pain to do with manually\n\n\n<img src=/img/3/image-3.png></img>\n\nalso you can add --technique=E to specify error-based attack. It makes things to go quicker.\n\n<img src=/img/3/image-4.png></img>\n\nWe can dump API key and create our admin account or crack admin's hash.\n\nFirst one is more faster and reliable <node data-id=8>so.</node>\n\n\n\n\n", "<img src=/img/3/image-0.png></img>\n\nWe can create our own admin account with API key. Se function generateHTML(levels, names) {
    let html = '<ul id="nodes">';
    let currentLevel = 1;

    for (let i = 0; i < levels.length; i++) {
        const level = levels[i];
        const name = names[i];
        const backgroundColor = `rgb(${51 + 17 * (level - 1)}, ${51 + 17 * (level - 1)}, ${51 + 17 * (level - 1)})`;

        while (currentLevel < level) {
            html += '<ul class="child-ul">';
            currentLevel++;
        }
        while (currentLevel > level) {
            html += '</ul>';
            currentLevel--;
        }
        html += `<li class="node" style="background-color: ${backgroundColor};"><div class="icon">+</div>${name}`;
        if (i + 1 < levels.length && levels[i + 1] === level) {
            html += '</li>';
        }
    }

    while (currentLevel > 1) {
        html += '</ul>';
        currentLevel--;
    }

    html += '</div>';
    return html;
}

const generatedHTML = generateHTML(levels, names);
document.getElementById('sidebar').innerHTML = generatedHTML;


var nodes = document.querySelectorAll(".node");

Array.from(nodes).forEach((node, index) => {
  addListener(node, index);
});

function addListener(node, id){
  node.addEventListener("click", e => {
    e.stopPropagation();
    showContent(id);
    render_links();
  });
}


function render_links(){
  var node_links = document.querySelectorAll("node");
  Array.from(node_links).forEach(link => {
    link.addEventListener("click", e => {
          
          var id = link.getAttribute("data-id"); 
          showContent(id-1);
      });
  });
}

function showContent(id){

  document.getElementById('content').innerHTML = content[id];

}


var icons = document.querySelectorAll(".icon");

Array.from(icons).forEach(icon => {
    icon.addEventListener("click",e =>{

      e.stopPropagation();

      toggleExpand(icon.parentNode)
      toggleIcon(icon);
    }
  )
}
);

function toggleIcon(icon) {
  icon.textContent = icon.textContent === "+" ? "-" : "+";
}


function toggleExpand(node){

    let childUl = node.querySelector(".child-ul")
    
    
    if(childUl){

      childUl.classList.toggle("expanded");
      expand_collapse(childUl);


    }
    
};

function expand_collapse(childUl){


  let parents = [];
  let element = childUl;
  while (element.id !== 'nodes') {
    
    if (element.classList.contains('child-ul')){
      parents.push(element);
    }
    element = element.parentElement;
  }

  if(childUl.classList.contains("expanded")){
  
  
  let childUls = Array.from(childUl.querySelectorAll(".child-ul"));
  let difference = parents.filter(x => !childUls.includes(x));

  let heightUl = 0;
  difference.forEach(parentUl => {

    heightUl += parentUl.scrollHeight;

    parentUl.style.maxHeight = heightUl + "px";


  })
  
  }
  else{
  
  let childUls = Array.from(childUl.querySelectorAll(".child-ul"));
  let difference = parents.filter(x => !childUls.includes(x));

  let heightUl = difference[0].scrollHeight;
  difference.forEach(parentUl => {

    parentUl.style.maxHeight = (parentUl.scrollHeight-heightUl) + "px";

  })
  }
}
